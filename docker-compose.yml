services:
  postgres:
    image: postgres:16-alpine
    container_name: usto-postgres
    environment:
      POSTGRES_DB: usto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - usto_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d usto"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usto-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      PORT: 8080
      DB_DRIVER: postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/usto?sslmode=disable
      JWT_SECRET: change-me-to-a-long-random-secret
      DEV_SMS_CODE: 1234
      ACCESS_TOKEN_HOURS: 24
      REFRESH_TOKEN_HOURS: 720
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  usto_postgres_data:
